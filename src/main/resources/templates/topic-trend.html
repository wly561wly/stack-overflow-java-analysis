<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>主题趋势分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        
        .container { max-width: 1400px; margin: 0 auto; }
        .content-wrapper { display: flex; gap: 20px; }

        .header { 
            background: white; 
            padding: 15px 20px; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .sidebar { width: 350px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); height: fit-content; }
        .main-content { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .topic-item { border-bottom: 1px solid #eee; padding: 8px 0; }
        .topic-header { display: flex; align-items: center; justify-content: space-between; }
        .keywords-panel { margin-left: 20px; margin-top: 5px; display: none; padding: 5px; background: #f8f9fa; border-radius: 4px; }
        .keyword-tag { display: inline-block; margin: 2px 5px; font-size: 0.9em; }
        
        .controls-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        
        button.btn-primary { background: #007bff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        button.btn-sm { padding: 2px 6px; font-size: 0.8em; border: 1px solid #ddd; background: white; cursor: pointer; }
        
        #chartContainer { width: 100%; height: 500px; }
        .pie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .pie-chart { height: 300px; }

        h2 { font-size: 1.5em; color: #333; margin: 0; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* 图例控制表格样式 */
        .legend-table-container { margin-top: 20px; border: 1px solid #eee; border-radius: 4px; padding: 10px; background: #fafafa; display: none; }
        .legend-table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        .legend-table th, .legend-table td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        .legend-table th { background-color: #f1f1f1; font-weight: bold; }
        .legend-table td:first-child, .legend-table th:first-child { text-align: left; font-weight: bold; background-color: #f9f9f9; }
        .legend-cb { cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>主题趋势分析</h2>
        <div style="font-size: 0.9em;">
            <a href="/" style="text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;">🏠 首页</a> |
            <span style="color: #666; margin-left: 10px;">📈 趋势分析</span> |
            <a href="/cooccurrence" style="text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;">🔗 共现分析</a> |
            <a href="/pitfall" style="text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;">⚠️ 陷阱分析</a> |
            <a href="/solvable" style="text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;">⚖️ 难易对比</a>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="sidebar">
            <h3>主题筛选</h3>
            <!-- 修复：恢复 Topic 全选/全不选按钮 -->
            <div style="margin-bottom: 10px; display: flex; gap: 5px;">
                <button class="btn-sm" onclick="toggleAllTopics(true)">全选主题</button>
                <button class="btn-sm" onclick="toggleAllTopics(false)">清空主题</button>
            </div>
            <div style="margin-bottom: 10px;">
                <button class="btn-sm" onclick="toggleAllKeywords(true)">展开所有关键词</button>
                <button class="btn-sm" onclick="toggleAllKeywords(false)">收起所有关键词</button>
            </div>
            
            <div id="topicList">
                <div th:each="topic : ${topics}" class="topic-item">
                    <div class="topic-header">
                        <label>
                            <input type="checkbox" class="topic-cb" th:value="${topic.id}" th:data-name="${topic.name}" checked onchange="handleTopicChange(this)">
                            <span th:text="${topic.name}" style="font-weight: bold;">Topic</span>
                        </label>
                        <button class="btn-sm" onclick="toggleKeywords(this)">展开</button>
                    </div>
                    <div class="keywords-panel">
                        <div style="margin-bottom: 5px; font-size: 0.8em;">
                            <a href="javascript:void(0)" onclick="batchSelectKeywords(this, true)">全选</a> / 
                            <a href="javascript:void(0)" onclick="batchSelectKeywords(this, false)">全不选</a>
                        </div>
                        <div th:each="kw : ${topic.relatedKeywords != null ? #strings.arraySplit(topic.relatedKeywords, ',') : {}}">
                            <label class="keyword-tag">
                                <input type="checkbox" class="kw-cb" th:data-kw="${#strings.trim(kw)}" th:value="${#strings.trim(kw)}" checked onchange="handleKeywordChange(this)">
                                <span th:text="${kw}">kw</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="controls-row">
                <div class="control-group">
                    <label>搜索范围</label>
                    <div>
                        <label><input type="checkbox" id="scope_tag" checked> Tag</label>
                        <label><input type="checkbox" id="scope_title" checked> Title</label>
                        <label><input type="checkbox" id="scope_fulltext" checked> 全文</label>
                    </div>
                </div>
                
                <div class="control-group">
                    <label>图表类型</label>
                    <select id="chartType">
                        <option value="line">折线图</option>
                        <option value="bar">柱状图</option>
                        <option value="pie">饼图</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>模式</label>
                    <select id="mode">
                        <option value="compare">对比 (Max 3)</option>
                        <option value="integrate">整合</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>时间范围</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="startDate" value="2020-01-01">
                        <input type="date" id="endDate" value="2024-12-31">
                    </div>
                </div>

                <button class="btn-primary" onclick="queryData()">查询趋势</button>
            </div>

            <div id="chartContainer"></div>
            
            <div id="legendTableContainer" class="legend-table-container">
                <h4>图表显示控制</h4>
                <table class="legend-table" id="legendTable">
                    <!-- 动态生成内容 -->
                </table>
            </div>

            <div id="pieContainer" class="pie-grid" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    // --- 交互逻辑 ---
    
    // 1. Topic 全选/全不选
    function toggleAllTopics(select) {
        document.querySelectorAll('.topic-cb').forEach(cb => {
            cb.checked = select;
            cb.indeterminate = false;
            handleTopicChange(cb); // 触发联动
        });
    }

    function toggleKeywords(btn) {
        const panel = btn.parentElement.nextElementSibling;
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        btn.innerText = panel.style.display === 'block' ? '收起' : '展开';
    }

    function toggleAllKeywords(show) {
        document.querySelectorAll('.keywords-panel').forEach(p => p.style.display = show ? 'block' : 'none');
    }

    function handleTopicChange(topicCb) {
        const panel = topicCb.closest('.topic-item').querySelector('.keywords-panel');
        const kws = panel.querySelectorAll('.kw-cb');
        // 清除半选状态（用户主动操作视为明确选择或取消）
        topicCb.indeterminate = false;
        kws.forEach(cb => {
            cb.checked = topicCb.checked;
            syncKeywordGlobally(cb);
        });
    }

    function handleKeywordChange(kwCb) {
        syncKeywordGlobally(kwCb);
        updateTopicCheckbox(kwCb.closest('.topic-item'));
    }

    function syncKeywordGlobally(sourceCb) {
        const kw = sourceCb.getAttribute('data-kw');
        const isChecked = sourceCb.checked;
        document.querySelectorAll(`.kw-cb[data-kw="${kw}"]`).forEach(cb => {
            if (cb !== sourceCb) {
                cb.checked = isChecked;
                updateTopicCheckbox(cb.closest('.topic-item'));
            }
        });
    }

    function updateTopicCheckbox(topicItem) {
        const topicCb = topicItem.querySelector('.topic-cb');
        const kws = topicItem.querySelectorAll('.kw-cb');
        if (!topicCb) return;
        let checkedCount = 0;
        kws.forEach(k => { if (k.checked) checkedCount++; });

        // 全选 -> checked true, indeterminate false
        if (checkedCount === kws.length && kws.length > 0) {
            topicCb.checked = true;
            topicCb.indeterminate = false;
        } else if (checkedCount === 0) {
            // 全不选 -> checked false, indeterminate false
            topicCb.checked = false;
            topicCb.indeterminate = false;
        } else {
            // 部分选中 -> 显示半选
            topicCb.checked = false; // 不将其视为主动勾选
            topicCb.indeterminate = true;
        }
    }
    function batchSelectKeywords(link, select) {
        const panel = link.closest('.keywords-panel');
        panel.querySelectorAll('.kw-cb').forEach(cb => {
            cb.checked = select;
            syncKeywordGlobally(cb);
        });
        updateTopicCheckbox(link.closest('.topic-item'));
    }

    // --- 图表逻辑 ---
    let mainChart = echarts.init(document.getElementById('chartContainer'));
    let pieCharts = [];
    // 全局变量存储用户在表格中的勾选状态： key = seriesName, value = boolean
    // 放在这里确保不会被 queryData 重置
    let legendState = {}; 

    function queryData() {
        // 收集参数：包括被勾选和处于半选(indeterminate)的 Topic
        let topicIds = Array.from(document.querySelectorAll('.topic-cb:checked')).map(c => c.value);
        let topicNames = Array.from(document.querySelectorAll('.topic-cb:checked')).map(c => c.getAttribute('data-name'));
        document.querySelectorAll('.topic-cb').forEach(cb => {
            if (!cb.checked && cb.indeterminate) {
                // 如果主题未被勾选但处于半选状态，则将其加入查询
                topicIds.push(cb.value);
                topicNames.push(cb.getAttribute('data-name'));
            }
        });
        topicIds = [...new Set(topicIds)];
        topicNames = [...new Set(topicNames)];

        // 使用 Set 去重收集所有被选中的关键词
        const selectedKws = new Set();
        document.querySelectorAll('.kw-cb:checked').forEach(cb => selectedKws.add(cb.value));
        
        const scopes = [];
        if(document.getElementById('scope_tag').checked) scopes.push('tag');
        if(document.getElementById('scope_title').checked) scopes.push('title');
        if(document.getElementById('scope_fulltext').checked) scopes.push('fulltext');

        const chartType = document.getElementById('chartType').value;
        const mode = document.getElementById('mode').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;

        if (topicIds.length === 0) return alert("请至少选择一个主题");
        if (scopes.length === 0) return alert("请至少选择一个搜索范围");
        if (chartType === 'pie' && mode === 'integrate') return alert("整合模式不支持饼图");
        if (mode === 'compare' && topicIds.length > 3) return alert("对比模式最多支持 3 个主题");

        mainChart.showLoading();

        const formData = new FormData();
        formData.append('topicIds', topicIds.join(','));
        formData.append('selectedKeywords', Array.from(selectedKws).join(','));
        formData.append('scopes', scopes.join(','));
        formData.append('chartType', chartType);
        formData.append('mode', mode);
        formData.append('startDate', startDate);
        formData.append('endDate', endDate);

        fetch('/trend/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                    mainChart.hideLoading();
                    if (data.error) {
                        alert(data.error);
                    } else {
                        renderCharts(data, chartType, topicNames, mode);
                    }
                })
            .catch(err => {
                mainChart.hideLoading();
                console.error(err);
                alert("请求失败，请检查控制台");
            });
    }

    function renderCharts(data, type, topicNames, mode) {
        const pieContainer = document.getElementById('pieContainer');
        const lineContainer = document.getElementById('chartContainer');
        const legendTableContainer = document.getElementById('legendTableContainer');
        
        pieContainer.innerHTML = '';
        pieCharts.forEach(c => c.dispose());
        pieCharts = [];

        if (type === 'pie') {
            lineContainer.style.display = 'none';
            legendTableContainer.style.display = 'none';
            pieContainer.style.display = 'grid';
            
            const metrics = ['questionCount', 'viewCount', 'answerCount', 'score'];
            const titles = ['问题数', '浏览数', '回答数', '点赞数'];
            
            metrics.forEach((m, idx) => {
                const div = document.createElement('div');
                div.className = 'pie-chart';
                pieContainer.appendChild(div);
                const chart = echarts.init(div);
                pieCharts.push(chart);
                const pieData = [];
                for (let topic in data.pies[m]) {
                    pieData.push({ name: topic, value: data.pies[m][topic] });
                }
                chart.setOption({
                    title: { text: titles[idx], left: 'center' },
                    tooltip: { trigger: 'item' },
                    series: [{ type: 'pie', radius: '50%', data: pieData }]
                });
            });

        } else {
            lineContainer.style.display = 'block';
            pieContainer.style.display = 'none';
            legendTableContainer.style.display = 'block';
            mainChart.resize();

            const series = [];
            const availableSeriesNames = [];

            // 兼容后端不同的返回字段
            // compare/integrate 模式返回 normalizedSeries (归一化) 和 originalSeries
            // fixedMetric 模式返回 fixedMetricSeries
            // 优先使用 normalizedSeries 以展示趋势，如果没有则尝试其他
            let sourceData = data.normalizedSeries || data.fixedMetricSeries || data.series || data.originalSeries || {};

            for (let key in sourceData) {
                availableSeriesNames.push(key);
                series.push({
                    name: key,
                    type: type,
                    data: sourceData[key],
                    smooth: true
                });
            }

            // 构建 legend selected 对象
            const legendSelected = {};
            availableSeriesNames.forEach(name => {
                // 状态保持：如果 legendState 中有记录，用记录值；否则默认 true
                if (!legendState.hasOwnProperty(name)) {
                    legendState[name] = true;
                }
                legendSelected[name] = legendState[name];
            });

            // 初始 Option
            mainChart.setOption({
                tooltip: { trigger: 'axis' },
                legend: { 
                    show: false, // 隐藏默认图例，使用自定义表格
                    data: availableSeriesNames,
                    selected: legendSelected
                },
                grid: { top: 30, bottom: 30, left: 50, right: 50 },
                xAxis: { type: 'category', data: data.dates },
                yAxis: { type: 'value' },
                series: series
            }, true); // true = clear old

            // 生成表格（传递 mode，用于整合模式 special-case）
            generateLegendTable(topicNames, availableSeriesNames, mode);
        }
    }

    function generateLegendTable(topicNames, availableSeriesNames, mode) {
        const table = document.getElementById('legendTable');
        table.innerHTML = '';

        // 整合模式特殊处理：只显示一行 "ALL"
        let displayTopics = topicNames;
        if (mode === 'integrate') {
            displayTopics = ['ALL'];
        }

        const metrics = [
            { key: 'questionCount', match: ['_count', 'questionCount'], label: '问题数' },
            { key: 'viewCount', match: ['_views', 'viewCount'], label: '浏览数' },
            { key: 'answerCount', match: ['_answers', 'answerCount'], label: '回答数' },
            { key: 'score', match: ['_score', 'score'], label: '点赞数' }
        ];

        // 表头
        const thead = document.createElement('tr');
        thead.innerHTML = '<th>Topic \\ Metric</th>';
        metrics.forEach(m => {
            thead.innerHTML += `
                <th>
                    <label>
                        <input type="checkbox" class="col-select" data-metric="${m.key}" checked onchange="toggleColumn(this)">
                        ${m.label}
                    </label>
                </th>`;
        });
        table.appendChild(thead);

        // 表体
        displayTopics.forEach(topic => {
            const isIntegrateRow = (mode === 'integrate' && topic === 'ALL');
            const displayName = isIntegrateRow ? '整合数据 (All Selected)' : topic;
            
            const tr = document.createElement('tr');
            
            // 如果是整合模式，行头禁用且默认选中
            const rowCheckboxHtml = isIntegrateRow 
                ? `<input type="checkbox" class="row-select" data-topic="${topic}" checked disabled>`
                : `<input type="checkbox" class="row-select" data-topic="${topic}" checked onchange="toggleRow(this)">`;

            tr.innerHTML = `
                <td>
                    <label>
                        ${rowCheckboxHtml}
                        ${displayName}
                    </label>
                </td>`;
            
            metrics.forEach(m => {
                // 匹配后端返回的 Series Name
                let matchedName = null;
                for (let sName of availableSeriesNames) {
                    // 模糊匹配：包含 Topic 名
                    if (sName.toLowerCase().indexOf(topic.toLowerCase()) === -1) continue;
                    
                    // 且包含 Metric 关键字
                    let isMetricMatch = false;
                    for(let matchKey of m.match) {
                        if (sName.indexOf(matchKey) !== -1) {
                            isMetricMatch = true;
                            break;
                        }
                    }
                    
                    if (isMetricMatch) {
                        matchedName = sName;
                        break;
                    }
                }

                if (matchedName) {
                    // 状态保持：如果 legendState 中有记录，用记录值；否则默认 true
                    if (!legendState.hasOwnProperty(matchedName)) {
                        legendState[matchedName] = true;
                    }
                    const isChecked = legendState[matchedName];

                    tr.innerHTML += `
                        <td>
                            <input type="checkbox" class="legend-cb" 
                                   data-topic="${topic}" data-metric="${m.key}" data-name="${matchedName}" 
                                   ${isChecked ? 'checked' : ''} 
                                   onchange="toggleSeries(this)">
                        </td>`;
                } else {
                    tr.innerHTML += `<td style="color:#ccc; font-size:0.8em;">-</td>`;
                }
            });
            table.appendChild(tr);
        });

        // 初始化表头勾选状态
        displayTopics.forEach(topic => updateRowHeaderState(topic));
        metrics.forEach(m => updateColHeaderState(m.key));
    }

    // applyLegendStateToChart 函数不再需要，因为我们在 setOption 中直接设置了 selected
    function applyLegendStateToChart() {
        // Deprecated
    }

    // 单个 Series 切换
    function toggleSeries(cb) {
        const name = cb.getAttribute('data-name');
        const isChecked = cb.checked;
        
        // 更新全局状态
        legendState[name] = isChecked;

        mainChart.dispatchAction({
            type: isChecked ? 'legendSelect' : 'legendUnSelect',
            name: name
        });

        // 联动更新行列标题状态
        updateRowHeaderState(cb.getAttribute('data-topic'));
        updateColHeaderState(cb.getAttribute('data-metric'));
    }

    // 切换整行 (Topic)
    function toggleRow(rowCb) {
        const topic = rowCb.getAttribute('data-topic');
        const targetState = rowCb.checked;
        // 用户主动点击行头视为明确操作，清除半选
        rowCb.indeterminate = false;
        const cbs = document.querySelectorAll(`.legend-cb[data-topic="${topic}"]`);
        cbs.forEach(cb => {
            cb.checked = targetState;
            toggleSeries(cb); // 复用逻辑更新状态和图表
        });
    }

    // 切换整列 (Metric)
    function toggleColumn(colCb) {
        const metric = colCb.getAttribute('data-metric');
        const targetState = colCb.checked;
        // 用户主动点击列头视为明确操作，清除半选
        colCb.indeterminate = false;
        const cbs = document.querySelectorAll(`.legend-cb[data-metric="${metric}"]`);
        cbs.forEach(cb => {
            cb.checked = targetState;
            toggleSeries(cb);
        });
    }

    function updateRowHeaderState(topic) {
        const rowCb = document.querySelector(`.row-select[data-topic="${topic}"]`);
        if(!rowCb) return;
        const cbs = document.querySelectorAll(`.legend-cb[data-topic="${topic}"]`);
        if(cbs.length === 0) return;

        let checkedCount = 0;
        cbs.forEach(cb => { if(cb.checked) checkedCount++; });

        if (checkedCount === 0) {
            rowCb.checked = false;
            rowCb.indeterminate = false;
        } else if (checkedCount === cbs.length) {
            rowCb.checked = true;
            rowCb.indeterminate = false;
        } else {
            rowCb.checked = false;
            rowCb.indeterminate = true;
        }
    }

    function updateColHeaderState(metric) {
        const colCb = document.querySelector(`.col-select[data-metric="${metric}"]`);
        if(!colCb) return;
        const cbs = document.querySelectorAll(`.legend-cb[data-metric="${metric}"]`);
        if(cbs.length === 0) return;

        let checkedCount = 0;
        cbs.forEach(cb => { if(cb.checked) checkedCount++; });

        if (checkedCount === 0) {
            colCb.checked = false;
            colCb.indeterminate = false;
        } else if (checkedCount === cbs.length) {
            colCb.checked = true;
            colCb.indeterminate = false;
        } else {
            colCb.checked = false;
            colCb.indeterminate = true;
        }
    }

    window.addEventListener('resize', () => {
        mainChart.resize();
        pieCharts.forEach(c => c.resize());
    });
</script>
</body>
</html>
