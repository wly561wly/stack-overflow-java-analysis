<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>主题共现分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; position: relative; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .chart-row { display: flex; gap: 20px; margin-top: 20px; }
        .chart-box { flex: 1; height: 500px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        a.nav-link { text-decoration: none; color: #007bff; font-weight: bold; }
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { padding: 8px 15px; background: #e9ecef; border: none; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background: #007bff; color: white; }

        /* 自动补全样式 */
        .suggestion-item:hover {
            background-color: #f0f0f0 !important;
        }

        .suggestion-item:last-child {
            border-bottom: none !important;
        }

        #topicSuggestions {
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 0 0 4px 4px;
            top: 100%;
            left: 0;
        }

        #specificTopicInput:focus {
            outline: none;
            border-color: #007bff !important;
            box-shadow: 0 0 0 2px rgba(0,123,255,0.25);
        }

        /* 雷达图控制按钮样式 */
        #radarControls {
            text-align: center;
            margin-bottom: 10px;
            display: none; /* 默认隐藏 */
        }

        #baseDataIndicator {
            margin-right: 15px;
            color: #5470c6;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>主题共现分析 (Co-occurrence)</h2>
        <div style="font-size: 0.9em;">
            <a href="/" class="nav-link">🏠 首页</a> |
            <a href="/trend" class="nav-link">📈 趋势分析</a> |
            <span style="color: #666; margin-left: 10px; font-weight: bold;">🔗 共现分析</span> |
            <a href="/pitfall" class="nav-link">⚠️ 陷阱分析</a> |
            <a href="/solvable" class="nav-link">⚖️ 难易对比</a>
        </div>
    </div>

    <div class="mode-toggle">
        <button class="mode-btn active" data-mode="general" onclick="switchMode('general')">总体共现分析</button>
        <button class="mode-btn" data-mode="specific" onclick="switchMode('specific')">特定话题关联分析</button>
    </div>

    <div class="controls" id="generalControls">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="startDate" value="2020-01-01">
                <input type="date" id="endDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>度量指标</label>
            <select id="metric">
                <option value="count">共现次数 (Count)</option>
                <option value="heat">共现热度 (Score + Views)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Top N (柱状图)</label>
            <select id="topN">
                <option value="10">Top 10</option>
                <option value="20">Top 20</option>
                <option value="50">Top 50</option>
            </select>
        </div>

        <button onclick="loadGeneralData()">分析关联</button>
    </div>

    <div class="controls" id="specificControls" style="display: none;">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="specificStartDate" value="2020-01-01">
                <input type="date" id="specificEndDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>输入话题名称</label>
            <input type="text" id="specificTopicInput" placeholder="请输入话题名称，如：java、spring、concurrency等"
                   style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
            <div id="topicSuggestions" style="display: none; position: absolute; background: white; border: 1px solid #ccc; max-height: 200px; overflow-y: auto; z-index: 1000; width: 100%;"></div>
            <div id="topicValidation" style="margin-top: 5px; font-size: 12px; color: #666;"></div>
        </div>

        <div class="control-group">
            <label>度量指标</label>
            <select id="specificMetric">
                <option value="count">共现次数 (Count)</option>
                <option value="heat">共现热度 (Score + Views)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Top N (柱状图)</label>
            <select id="specificTopN">
                <option value="5">Top 5</option>
                <option value="10">Top 10</option>
            </select>
        </div>

        <button onclick="validateAndLoadSpecificTopicData()">分析关联</button>
    </div>

    <!-- 雷达图控制按钮 -->
    <div id="radarControls">
        <span id="baseDataIndicator" style="display: none;"></span>
        <button onclick="setAsBaseData()">设为基底数据</button>
        <button onclick="clearBaseData()">清除基底数据</button>
    </div>

    <div class="chart-row">
        <div id="heatmapChart" class="chart-box"></div>
        <div id="barChart" class="chart-box"></div>
    </div>
</div>

<script>
    let heatmapChart, barChart;
    let currentMode = 'general';
    let selectedTopicId = null;
    let lastValidTopicId = null;
    let isTopNListenerSetup = false;
    let allTopics = [];
    let topicIdNameMap = new Map();

    // 存储基底雷达图数据
    let baseRadarData = null;
    // 存储当前对比的雷达图数据
    let currentRadarData = null;

    // 修复：正确的页面加载初始化
    window.onload = function() {
        console.log('页面加载完成，初始化组件...');

        // 检查图表容器
        const heatmapContainer = document.getElementById('heatmapChart');
        const barContainer = document.getElementById('barChart');

        if (!heatmapContainer || !barContainer) {
            console.error('图表容器未找到！');
            return;
        }

        // 初始化ECharts实例
        heatmapChart = echarts.init(heatmapContainer);
        barChart = echarts.init(barContainer);

        loadTopics();
        loadGeneralData();
        setupTopicInput();
        setupTopNListener();
    };

    // 修复：正确的模式切换函数（核心修改：切换模式时调整图表显示逻辑）
    function switchMode(mode) {
        currentMode = mode;

        // 修复：使用data-mode属性选择器
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');

        // 显示/隐藏控件
        document.getElementById('generalControls').style.display = mode === 'general' ? 'flex' : 'none';
        document.getElementById('specificControls').style.display = mode === 'specific' ? 'flex' : 'none';

        // 控制雷达图控制按钮的显示/隐藏
        document.getElementById('radarControls').style.display = mode === 'specific' ? 'block' : 'none';

        // 清空所有图表
        heatmapChart.clear();
        barChart.clear();

        // 额外清除雷达图相关的数据和状态
        if (mode === 'general') {
            // 切换到总体模式时，清除雷达图相关的数据
            baseRadarData = null;
            currentRadarData = null;
            document.getElementById('baseDataIndicator').style.display = 'none';
        }

        // 根据模式调整图表显示
        if (mode === 'general') {
            // 总体模式：恢复原有布局
            document.getElementById('barChart').style.display = 'block';
            document.getElementById('heatmapChart').style.display = 'block';
            loadGeneralData();
        } else if (mode === 'specific') {
            // 特定模式：左侧显示柱状图，右侧显示雷达图
            document.getElementById('barChart').style.display = 'block';
            document.getElementById('heatmapChart').style.display = 'block';
        }

        // 重置特定话题输入
        if (mode === 'specific') {
            document.getElementById('specificTopicInput').value = '';
            document.getElementById('topicValidation').textContent = '';
            // 清除基底数据
            clearBaseData();
        }
    }
    // 设置Top N选择框的变化监听
    function setupTopNListener() {
        const topNSelect = document.getElementById('specificTopN');
        if (!topNSelect) {
            console.error('找不到 specificTopN 元素，将在100ms后重试');
            setTimeout(setupTopNListener, 100);
            return;
        }

        // 避免重复绑定监听器
        if (isTopNListenerSetup) {
            console.log('Top N监听器已设置，跳过重复绑定');
            return;
        }

        console.log('设置Top N监听器...');
        topNSelect.addEventListener('change', handleTopNChange);
        isTopNListenerSetup = true;
        console.log('Top N监听器设置成功');
    }

    // Top N变化处理函数
    function handleTopNChange() {
        const newTopN = this.value;
        console.log('Top N值变化:', newTopN, 'lastValidTopicId:', lastValidTopicId);

        // 只有当已经选择了有效话题时才重新加载数据
        if (lastValidTopicId) {
            console.log('检测到有效话题ID，重新加载数据...');
            loadSpecificTopicDataWithId(lastValidTopicId);
        } else {
            console.log('没有有效话题ID，不重新加载数据');
        }
    }

    // 设置话题输入框的自动补全功能
    function setupTopicInput() {
        const input = document.getElementById('specificTopicInput');
        const suggestions = document.getElementById('topicSuggestions');
        const validation = document.getElementById('topicValidation');

        // 输入事件处理
        input.addEventListener('input', function () {
            const value = this.value.trim();
            selectedTopicId = null;
            validation.textContent = '';
            validation.style.color = '#666';

            if (value.length === 0) {
                suggestions.style.display = 'none';
                return;
            }

            // 过滤匹配的话题
            const matchedTopics = allTopics.filter(topic =>
                topic.name.toLowerCase().includes(value.toLowerCase())
            );

            if (matchedTopics.length > 0) {
                suggestions.innerHTML = matchedTopics.map(topic =>
                    `<div class="suggestion-item" data-id="${topic.id}" data-name="${topic.name}"
                         style="padding: 8px; cursor: pointer; border-bottom: 1px solid #eee;"
                         onmouseover="this.style.background='#f0f0f0'"
                         onmouseout="this.style.background='white'">
                         ${topic.name}
                     </div>`
                ).join('');
                suggestions.style.display = 'block';

                // 确保建议框在输入框下方正确显示
                const inputRect = input.getBoundingClientRect();
                suggestions.style.top = '100%';
                suggestions.style.left = '0';
            } else {
                suggestions.style.display = 'none';
                validation.textContent = '未找到匹配的话题，请输入有效的话题名称';
                validation.style.color = '#ff6b6b';
            }
        });

        // 点击建议项
        suggestions.addEventListener('click', function (e) {
            if (e.target.classList.contains('suggestion-item')) {
                const topicId = e.target.getAttribute('data-id');
                const topicName = e.target.getAttribute('data-name');
                input.value = topicName;
                selectedTopicId = topicId;
                lastValidTopicId = topicId; // 修复：设置有效话题ID
                suggestions.style.display = 'none';
                validation.textContent = `已选择话题: ${topicName}`;
                validation.style.color = '#28a745';
                console.log('通过自动补全选择话题:', topicName, 'ID:', topicId, '设置 lastValidTopicId:', lastValidTopicId);
            }
        });

        // 点击其他地方隐藏建议框
        document.addEventListener('click', function (e) {
            if (e.target !== input && !suggestions.contains(e.target)) {
                suggestions.style.display = 'none';
            }
        });

        // 回车键确认
        input.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                validateAndLoadSpecificTopicData();
            }
        });
    }

    // 验证话题并加载数据
    function validateAndLoadSpecificTopicData() {
        const input = document.getElementById('specificTopicInput');
        const topicName = input.value.trim();
        const validation = document.getElementById('topicValidation');

        if (!topicName) {
            validation.textContent = '请输入话题名称';
            validation.style.color = '#ff6b6b';
            return;
        }

        // 检查是否通过自动补全选择了有效话题
        if (selectedTopicId) {
            // 直接使用已选择的话题ID
            console.log('通过自动补全验证，加载话题数据...');
            loadSpecificTopicDataWithId(selectedTopicId);
            return;
        }

        // 如果没有通过自动补全选择，需要验证话题名称
        validation.textContent = '正在验证话题...';
        validation.style.color = '#666';

        // 获取所有话题并验证
        const matchedTopic = allTopics.find(topic =>
            topic.name.toLowerCase() === topicName.toLowerCase()
        );

        if (matchedTopic) {
            validation.textContent = `话题验证通过: ${matchedTopic.name}`;
            validation.style.color = '#28a745';
            console.log('手动输入验证通过，加载话题数据...');
            loadSpecificTopicDataWithId(matchedTopic.id);
        } else {
            validation.textContent = `话题 "${topicName}" 不是有效话题，请从建议列表中选择或输入有效话题名称`;
            validation.style.color = '#ff6b6b';
            console.log('话题验证失败:', topicName);
        }
    }

    // 使用话题ID加载特定话题数据
    function loadSpecificTopicDataWithId(topicId) {
        const topNSelect = document.getElementById('specificTopN');
        if (!topNSelect) {
            console.error('找不到 specificTopN 元素');
            return;
        }

        const topNValue = topNSelect.value;
        console.log('加载特定话题数据 - topicId:', topicId, 'topN:', topNValue);

        // 显示loading
        heatmapChart.showLoading();
        barChart.showLoading();

        // 记录当前有效的topicId
        lastValidTopicId = topicId;
        console.log('设置 lastValidTopicId:', lastValidTopicId);

        const formData = new FormData();
        formData.append('startDate', document.getElementById('specificStartDate').value);
        formData.append('endDate', document.getElementById('specificEndDate').value);
        formData.append('metric', document.getElementById('specificMetric').value);
        formData.append('topN', topNValue);
        formData.append('topicId', topicId);

        // 调试：显示实际发送的参数
        console.log('发送的参数:');
        for (let [key, value] of formData.entries()) {
            console.log(key + ': ' + value);
        }

        fetch('/cooccurrence/specific-topic-data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                heatmapChart.hideLoading();
                barChart.hideLoading();

                if (data.error) {
                    console.error('后端返回错误:', data.error);
                    alert(data.error);
                } else {
                    console.log('成功获取数据，渲染图表...');

                    // 渲染左侧柱状图
                    renderSpecificBarChart(data, true);

                    // 如果有数据，显示关联度最高的话题的雷达图
                    if (data.barX && data.barX.length > 0) {
                        // 获取第一个话题名称对应的ID
                        const topRelatedTopicName = data.barX[0];
                        const topRelatedTopicId = [...topicIdNameMap.entries()]
                            .find(([id, name]) => name === topRelatedTopicName)?.[0];

                        if (topRelatedTopicId) {
                            // 加载雷达图数据
                            loadRadarData(topicId, topRelatedTopicId);
                        }
                    }
                }
            })
            .catch(err => {
                console.error('请求失败:', err);
                heatmapChart.hideLoading();
                barChart.hideLoading();
                alert("请求失败");
            });
    }

    // 加载话题数据
    function loadTopics() {
        fetch('/cooccurrence/topics')
            .then(res => res.json())
            .then(topics => {
                // 话题列表用于自动补全
                allTopics = topics;
                console.log('获取到话题列表:', topics.length, '个话题');

                // 构建ID-名称映射
                topicIdNameMap.clear();
                topics.forEach(topic => {
                    topicIdNameMap.set(topic.id, topic.name);
                });
            })
            .catch(err => {
                console.error('获取话题列表失败:', err);
            });
    }

    // 加载雷达图数据
    function loadRadarData(mainTopicId, relatedTopicId) {
        const formData = new FormData();
        formData.append('mainTopicId', mainTopicId);
        formData.append('relatedTopicId', relatedTopicId);
        formData.append('startDate', document.getElementById('specificStartDate').value);
        formData.append('endDate', document.getElementById('specificEndDate').value);

        barChart.showLoading();

        fetch('/cooccurrence/radar-data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                barChart.hideLoading();

                if (data.error) {
                    console.error('后端返回错误:', data.error);
                    alert(data.error);
                } else {
                    renderRadarChart(data);
                }
            })
            .catch(err => {
                console.error('请求失败:', err);
                barChart.hideLoading();
                alert("请求失败");
            });
    }

    // 加载总体数据
    function loadGeneralData() {
        heatmapChart.showLoading();
        barChart.showLoading();

        const formData = new FormData();
        formData.append('startDate', document.getElementById('startDate').value);
        formData.append('endDate', document.getElementById('endDate').value);
        formData.append('metric', document.getElementById('metric').value);
        formData.append('topN', document.getElementById('topN').value);

        fetch('/cooccurrence/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                heatmapChart.hideLoading();
                barChart.hideLoading();
                if (data.error) {
                    alert(data.error);
                } else {
                    renderHeatmap(data);
                    renderGeneralBarChart(data);
                }
            })
            .catch(err => {
                console.error(err);
                heatmapChart.hideLoading();
                barChart.hideLoading();
                alert("请求失败");
            });
    }

    // 渲染热力图
    function renderHeatmap(data) {
        console.log('渲染热力图，数据:', data);

        if (!data.heatmapAxis || !data.heatmapData) {
            console.error('热力图数据格式错误:', data);
            return;
        }

        const option = {
            title: { text: '主题关联热力图 (Top Active Topics)', left: 'center' },
            tooltip: { position: 'top' },
            grid: { height: '70%', top: '15%' },
            xAxis: { type: 'category', data: data.heatmapAxis, splitArea: { show: true }, axisLabel: { rotate: 45 } },
            yAxis: { type: 'category', data: data.heatmapAxis, splitArea: { show: true } },
            visualMap: {
                min: 0,
                max: data.heatmapData.reduce((max, item) => Math.max(max, item[2]), 0),
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: '0%'
            },
            series: [{
                name: '关联强度',
                type: 'heatmap',
                data: data.heatmapData,
                label: { show: false },
                emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
        };

        try {
            heatmapChart.setOption(option);
            console.log('热力图渲染成功');
        } catch (error) {
            console.error('热力图渲染失败:', error);
        }
    }

    // 渲染总体柱状图
    function renderGeneralBarChart(data) {
        console.log('渲染总体柱状图，数据:', data);

        if (!data.barX || !data.barY) {
            console.error('总体柱状图数据格式错误:', data);
            barChart.setOption({
                title: { text: '数据格式错误', left: 'center' },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: ['错误'] },
                series: [{ type: 'bar', data: [0] }]
            });
            return;
        }

        const option = {
            title: { text: '高频共现主题对 (Top N)', left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: data.barX, inverse: true },
            series: [{
                name: '数值',
                type: 'bar',
                data: data.barY,
                itemStyle: { color: '#5470c6' }
            }]
        };

        try {
            barChart.setOption(option);
            console.log('总体柱状图渲染成功');
        } catch (error) {
            console.error('总体柱状图渲染失败:', error);
        }
    }

    // 增强的特定话题柱状图渲染函数（核心修改：支持渲染到左侧容器）
    function renderSpecificBarChart(data, renderToLeft = false) {
        console.log('渲染特定话题柱状图，数据:', data, '是否渲染到左侧:', renderToLeft);

        if (!data.barX || !data.barY) {
            console.error('特定话题柱状图数据格式错误，缺少barX或barY:', data);
            // 渲染错误提示到目标容器
            const errorOption = {
                title: { text: '数据格式错误', left: 'center' },
                xAxis: { type: 'value' },
                yAxis: { type: 'category', data: ['错误'] },
                series: [{ type: 'bar', data: [0] }]
            };
            if (renderToLeft) {
                heatmapChart.setOption(errorOption);
            } else {
                barChart.setOption(errorOption);
            }
            return;
        }

        const title = data.topicName ? `与 "${data.topicName}" 关联度最高的话题 (Top N)` : '话题关联度分析 (Top N)';

        // 构建柱状图配置
        const option = {
            title: { text: title, left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: data.barX, inverse: true },
            series: [{
                name: '数值',
                type: 'bar',
                data: data.barY,
                itemStyle: { color: '#5470c6' }
            }]
        };

        try {
            // 根据参数决定渲染到左侧（heatmapChart）还是右侧（barChart）
            if (renderToLeft) {
                heatmapChart.setOption(option);

                // 添加点击事件监听
                heatmapChart.off('click');
                heatmapChart.on('click', function(params) {
                    if (params.componentType === 'series' && params.seriesType === 'bar') {
                        // 获取点击的话题名称
                        const clickedTopicName = params.name;
                        console.log('点击了话题:', clickedTopicName);

                        // 获取点击的话题名称对应的ID
                        const clickedTopicId = [...topicIdNameMap.entries()]
                            .find(([id, name]) => name === clickedTopicName)?.[0];

                        if (clickedTopicId && lastValidTopicId) {
                            // 加载雷达图数据
                            loadRadarData(lastValidTopicId, clickedTopicId);
                        }
                    }
                });
            } else {
                barChart.setOption(option);
            }
            console.log('特定话题柱状图渲染成功（目标：', renderToLeft ? '左侧' : '右侧', '）');
        } catch (error) {
            console.error('特定话题柱状图渲染失败:', error);
        }
    }

    // 渲染雷达图（修改版本）
    function renderRadarChart(data, isBaseData = false) {
        if (!data.indicator || !data.values) {
            console.error('雷达图数据格式错误:', data);
            return;
        }

        // 根据isBaseData参数决定是设置基底数据还是当前对比数据
        if (isBaseData) {
            baseRadarData = JSON.parse(JSON.stringify(data)); // 深拷贝
            // 更新界面提示用户已设置基底数据
            document.getElementById('baseDataIndicator').textContent = `基底数据: ${data.mainTopic} 与 ${data.relatedTopic}`;
            document.getElementById('baseDataIndicator').style.display = 'inline';
        } else {
            currentRadarData = JSON.parse(JSON.stringify(data)); // 深拷贝
        }

        // 如果有基底数据，则显示对比雷达图；否则显示单个雷达图
        if (baseRadarData && currentRadarData) {
            renderComparisonRadarChart(baseRadarData, currentRadarData);
        } else {
            renderSingleRadarChart(isBaseData ? baseRadarData : currentRadarData);
        }
    }

    // 渲染单个雷达图
    function renderSingleRadarChart(data) {
        if (!data) return;

        const option = {
            title: {
                text: `${data.mainTopic} 与 ${data.relatedTopic} 的共现五维分析`,
                left: 'center'
            },
            tooltip: {},
            radar: {
                indicator: data.indicator.map((name, index) => ({
                    name: name,
                    max: Math.max(...data.values) * 1.2 // 设置最大值为数据的1.2倍，使图表更美观
                }))
            },
            series: [{
                name: '共现指标',
                type: 'radar',
                data: [{
                    value: data.values,
                    name: '共现指标'
                }]
            }]
        };

        try {
            barChart.setOption(option, true); // 使用true参数清除之前的配置
            console.log('单个雷达图渲染成功');
        } catch (error) {
            console.error('单个雷达图渲染失败:', error);
        }
    }

    // 渲染对比雷达图
    function renderComparisonRadarChart(baseData, currentData) {
        // 合并两个数据集的指标，取最大的值作为雷达图的最大值
        const combinedValues = [];
        for (let i = 0; i < baseData.values.length; i++) {
            combinedValues.push(Math.max(baseData.values[i], currentData.values[i]));
        }

        const maxValue = Math.max(...combinedValues) * 1.2;

        const option = {
            title: {
                text: `基底: ${baseData.mainTopic} 与 ${baseData.relatedTopic} | 对比: ${currentData.mainTopic} 与 ${currentData.relatedTopic}`,
                left: 'center'
            },
            legend: {
                data: ['基底数据', '当前数据'],
                bottom: 0
            },
            tooltip: {},
            radar: {
                indicator: baseData.indicator.map((name, index) => ({
                    name: name,
                    max: maxValue
                }))
            },
            series: [{
                name: '共现指标对比',
                type: 'radar',
                data: [
                    {
                        value: baseData.values,
                        name: '基底数据',
                        itemStyle: { color: '#5470c6' },
                        lineStyle: { color: '#5470c6' },
                        areaStyle: { color: '#5470c6', opacity: 0.3 }
                    },
                    {
                        value: currentData.values,
                        name: '当前数据',
                        itemStyle: { color: '#ee6666' },
                        lineStyle: { color: '#ee6666' },
                        areaStyle: { color: '#ee6666', opacity: 0.3 }
                    }
                ]
            }]
        };

        try {
            barChart.setOption(option, true); // 使用true参数清除之前的配置
            console.log('对比雷达图渲染成功');
        } catch (error) {
            console.error('对比雷达图渲染失败:', error);
        }
    }

    // 设置当前数据为基底数据
    function setAsBaseData() {
        if (currentRadarData) {
            renderRadarChart(currentRadarData, true); // 将当前数据设为基底
        } else {
            alert('当前没有可设置为基底的数据');
        }
    }

    // 清除基底数据
    // 清除基底数据
    function clearBaseData() {
        baseRadarData = null;
        currentRadarData = null;  // 同时清除当前数据
        document.getElementById('baseDataIndicator').style.display = 'none';

        // 清除雷达图显示
        barChart.clear();

        // 重新渲染当前数据（如果存在且在特定模式下）
        if (currentMode === 'specific' && lastValidTopicId) {
            // 重新加载当前话题的数据
            loadSpecificTopicDataWithId(lastValidTopicId);
        }
    }
    window.addEventListener('resize', () => {
        if (heatmapChart) heatmapChart.resize();
        if (barChart) barChart.resize();
    });
</script>
</body>
</html>
