<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>主题共现分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .chart-row { display: flex; gap: 20px; margin-top: 20px; }
        .chart-box { flex: 1; height: 500px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        a.nav-link { text-decoration: none; color: #007bff; font-weight: bold; }
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-btn { padding: 8px 15px; background: #e9ecef; border: none; border-radius: 4px; cursor: pointer; }
        .mode-btn.active { background: #007bff; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>主题共现分析 (Co-occurrence)</h2>
        <div style="font-size: 0.9em;">
            <a href="/" class="nav-link">🏠 首页</a> |
            <a href="/trend" class="nav-link">📈 趋势分析</a> |
            <span style="color: #666; margin-left: 10px; font-weight: bold;">🔗 共现分析</span> |
            <a href="/pitfall" class="nav-link">⚠️ 陷阱分析</a> |
            <a href="/solvable" class="nav-link">⚖️ 难易对比</a>
        </div>
    </div>

    <div class="mode-toggle">
        <button class="mode-btn active" onclick="switchMode('general')">总体共现分析</button>
        <button class="mode-btn" onclick="switchMode('specific')">特定话题关联分析</button>
    </div>

    <div class="controls" id="generalControls">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="startDate" value="2020-01-01">
                <input type="date" id="endDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>度量指标</label>
            <select id="metric">
                <option value="count">共现次数 (Count)</option>
                <option value="heat">共现热度 (Score + Views)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Top N (柱状图)</label>
            <select id="topN">
                <option value="10">Top 10</option>
                <option value="20">Top 20</option>
                <option value="50">Top 50</option>
            </select>
        </div>

        <button onclick="loadGeneralData()">分析关联</button>
    </div>

    <div class="controls" id="specificControls" style="display: none;">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="specificStartDate" value="2020-01-01">
                <input type="date" id="specificEndDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>选择话题</label>
            <select id="specificTopic">
                <option value="">请选择话题</option>
            </select>
        </div>

        <div class="control-group">
            <label>度量指标</label>
            <select id="specificMetric">
                <option value="count">共现次数 (Count)</option>
                <option value="heat">共现热度 (Score + Views)</option>
            </select>
        </div>

        <div class="control-group">
            <label>Top N (柱状图)</label>
            <select id="specificTopN">
                <option value="10">Top 10</option>
                <option value="20">Top 20</option>
                <option value="50">Top 50</option>
            </select>
        </div>

        <button onclick="loadSpecificTopicData()">分析关联</button>
    </div>

    <div class="chart-row">
        <div id="heatmapChart" class="chart-box"></div>
        <div id="barChart" class="chart-box"></div>
    </div>
</div>

<script>
    let heatmapChart = echarts.init(document.getElementById('heatmapChart'));
    let barChart = echarts.init(document.getElementById('barChart'));
    let currentMode = 'general'; // 'general' or 'specific'

    // 页面加载时获取话题列表
    window.onload = function() {
        loadTopics();
        loadGeneralData();
    };

    function switchMode(mode) {
        currentMode = mode;

        // 更新按钮状态
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // 显示/隐藏控件
        document.getElementById('generalControls').style.display = mode === 'general' ? 'flex' : 'none';
        document.getElementById('specificControls').style.display = mode === 'specific' ? 'flex' : 'none';

        // 清空图表
        heatmapChart.clear();
        barChart.clear();
    }

    function loadTopics() {
        fetch('/cooccurrence/topics')
            .then(res => res.json())
            .then(topics => {
                const select = document.getElementById('specificTopic');
                select.innerHTML = '<option value="">请选择话题</option>';
                topics.forEach(topic => {
                    const option = document.createElement('option');
                    option.value = topic.id;
                    option.textContent = topic.name;
                    select.appendChild(option);
                });
            })
            .catch(err => {
                console.error('获取话题列表失败:', err);
            });
    }

    function loadGeneralData() {
        heatmapChart.showLoading();
        barChart.showLoading();

        const formData = new FormData();
        formData.append('startDate', document.getElementById('startDate').value);
        formData.append('endDate', document.getElementById('endDate').value);
        formData.append('metric', document.getElementById('metric').value);
        formData.append('topN', document.getElementById('topN').value);

        fetch('/cooccurrence/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                heatmapChart.hideLoading();
                barChart.hideLoading();
                if (data.error) {
                    alert(data.error);
                } else {
                    renderHeatmap(data);
                    renderGeneralBarChart(data);
                }
            })
            .catch(err => {
                console.error(err);
                heatmapChart.hideLoading();
                barChart.hideLoading();
                alert("请求失败");
            });
    }

    function loadSpecificTopicData() {
        const topicId = document.getElementById('specificTopic').value;
        if (!topicId) {
            alert('请选择一个话题');
            return;
        }

        barChart.showLoading();
        heatmapChart.clear(); // 特定话题分析不需要热力图

        const formData = new FormData();
        formData.append('startDate', document.getElementById('specificStartDate').value);
        formData.append('endDate', document.getElementById('specificEndDate').value);
        formData.append('metric', document.getElementById('specificMetric').value);
        formData.append('topN', document.getElementById('specificTopN').value);
        formData.append('topicId', topicId);

        fetch('/cooccurrence/specific-topic-data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                barChart.hideLoading();
                if (data.error) {
                    alert(data.error);
                } else {
                    renderSpecificBarChart(data);
                }
            })
            .catch(err => {
                console.error(err);
                barChart.hideLoading();
                alert("请求失败");
            });
    }

    function renderHeatmap(data) {
        const option = {
            title: { text: '主题关联热力图 (Top Active Topics)', left: 'center' },
            tooltip: { position: 'top' },
            grid: { height: '70%', top: '15%' },
            xAxis: { type: 'category', data: data.heatmapAxis, splitArea: { show: true }, axisLabel: { rotate: 45 } },
            yAxis: { type: 'category', data: data.heatmapAxis, splitArea: { show: true } },
            visualMap: {
                min: 0,
                max: data.heatmapData.reduce((max, item) => Math.max(max, item[2]), 0),
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: '0%'
            },
            series: [{
                name: '关联强度',
                type: 'heatmap',
                data: data.heatmapData,
                label: { show: false },
                emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
        };
        heatmapChart.setOption(option);
    }

    function renderGeneralBarChart(data) {
        const option = {
            title: { text: '高频共现主题对 (Top N)', left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: data.barX, inverse: true }, // inverse 让第一名在上面
            series: [{
                name: '数值',
                type: 'bar',
                data: data.barY,
                itemStyle: { color: '#5470c6' }
            }]
        };
        barChart.setOption(option);
    }

    function renderSpecificBarChart(data) {
        const title = data.topicName ? `与 "${data.topicName}" 关联度最高的话题 (Top N)` : '话题关联度分析 (Top N)';
        const option = {
            title: { text: title, left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'value' },
            yAxis: { type: 'category', data: data.barX, inverse: true }, // inverse 让第一名在上面
            series: [{
                name: '数值',
                type: 'bar',
                data: data.barY,
                itemStyle: { color: '#5470c6' }
            }]
        };
        barChart.setOption(option);
    }

    window.addEventListener('resize', () => {
        heatmapChart.resize();
        barChart.resize();
    });
</script>
</body>
</html>
