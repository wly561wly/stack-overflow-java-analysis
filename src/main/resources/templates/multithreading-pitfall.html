<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>多线程常见陷阱分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin-top: 20px;}
        button:hover { background: #0056b3; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-full { width: 100%; height: 400px; margin-top: 20px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        .chart-box { height: 400px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        a.nav-link { text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;}
        .checkbox-group { display: flex; flex-direction: column; gap: 2px; max-height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>多线程常见陷阱分析 (Multithreading Pitfalls)</h2>
        <div style="font-size: 0.9em;">
            <a href="/" class="nav-link">🏠 首页</a> |
            <a href="/trend" class="nav-link">📈 趋势分析</a> |
            <a href="/cooccurrence" class="nav-link">🔗 共现分析</a> |
            <span style="color: #666; margin-left: 10px; font-weight: bold;">⚠️ 陷阱分析</span> |
            <a href="/solvable" class="nav-link">⚖️ 难易对比</a>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="startDate" value="2020-01-01">
                <input type="date" id="endDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>陷阱类型筛选 (多选)</label>
            <div class="checkbox-group">
                <div th:each="p : ${pitfalls}">
                    <label><input type="checkbox" class="pitfall-cb" th:value="${p}" checked> <span th:text="${p}"></span></label>
                </div>
            </div>
        </div>

        <button onclick="loadData()">分析陷阱</button>
    </div>

    <div class="chart-grid">
        <div id="pieChart" class="chart-box"></div>
        <div id="barChart" class="chart-box"></div>
    </div>
    <div id="lineChart" class="chart-full"></div>
</div>

<script>
    let pieChart = echarts.init(document.getElementById('pieChart'));
    let barChart = echarts.init(document.getElementById('barChart'));
    let lineChart = echarts.init(document.getElementById('lineChart'));

    function loadData() {
        pieChart.showLoading();
        barChart.showLoading();
        lineChart.showLoading();

        const selectedPitfalls = Array.from(document.querySelectorAll('.pitfall-cb:checked')).map(cb => cb.value);
        
        const formData = new FormData();
        formData.append('startDate', document.getElementById('startDate').value);
        formData.append('endDate', document.getElementById('endDate').value);
        formData.append('selectedPitfalls', selectedPitfalls.join(','));

        fetch('/pitfall/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                pieChart.hideLoading();
                barChart.hideLoading();
                lineChart.hideLoading();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    renderPieChart(data);
                    renderBarChart(data);
                    renderLineChart(data);
                }
            })
            .catch(err => {
                console.error(err);
                pieChart.hideLoading();
                barChart.hideLoading();
                lineChart.hideLoading();
                alert("请求失败");
            });
    }

    function renderPieChart(data) {
        const option = {
            title: { text: '陷阱问题分布', left: 'center' },
            tooltip: { trigger: 'item' },
            legend: { orient: 'vertical', left: 'left' },
            series: [{
                name: '问题数量',
                type: 'pie',
                radius: '50%',
                data: data.pieData,
                emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0, 0, 0, 0.5)' } }
            }]
        };
        pieChart.setOption(option);
    }

    function renderBarChart(data) {
        const option = {
            title: { text: '陷阱指标对比', left: 'center' },
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            legend: { top: 'bottom' },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'category', data: data.barX, axisLabel: { interval: 0, rotate: 30 } },
            yAxis: [
                { type: 'value', name: '数量/热度' },
                { type: 'value', name: '解决率 (%)', min: 0, max: 100 }
            ],
            series: [
                { name: '问题数量', type: 'bar', data: data.barCount },
                { name: '热度', type: 'bar', data: data.barHeat },
                { name: '解决率', type: 'line', yAxisIndex: 1, data: data.barSolveRate }
            ]
        };
        barChart.setOption(option);
    }

    function renderLineChart(data) {
        const series = [];
        for (let key in data.lineSeries) {
            // 默认只显示 Count，Heat 隐藏，避免太乱
            let isVisible = key.endsWith('_count');
            series.push({
                name: key,
                type: 'line',
                data: data.lineSeries[key],
                smooth: true,
                selected: isVisible // ECharts series selected property might not work directly like this in all versions, usually controlled by legend
            });
        }

        const option = {
            title: { text: '陷阱趋势分析', left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: { top: 'bottom', type: 'scroll' },
            xAxis: { type: 'category', data: data.dates },
            yAxis: { type: 'value' },
            series: series
        };
        lineChart.setOption(option);
    }

    window.addEventListener('resize', () => {
        pieChart.resize();
        barChart.resize();
        lineChart.resize();
    });

    // 初始加载
    loadData();
</script>
</body>
</html>
