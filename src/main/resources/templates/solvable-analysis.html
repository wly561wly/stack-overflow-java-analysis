<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>可解决 vs 难解决问题对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-box { height: 400px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        .chart-full { width: 100%; height: 400px; margin-top: 20px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        a.nav-link { text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>可解决 vs 难解决问题对比 (Solvable vs Hard)</h2>
        <div style="font-size: 0.9em;">
            <a href="/" class="nav-link">🏠 首页</a> |
            <a href="/trend" class="nav-link">📈 趋势分析</a> |
            <a href="/cooccurrence" class="nav-link">🔗 共现分析</a> |
            <a href="/pitfall" class="nav-link">⚠️ 陷阱分析</a> |
            <span style="color: #666; margin-left: 10px; font-weight: bold;">⚖️ 难易对比</span>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="startDate" value="2020-01-01">
                <input type="date" id="endDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>主题筛选 (可选)</label>
            <select id="topicId">
                <option value="">-- 所有主题 --</option>
                <option th:each="t : ${topics}" th:value="${t.id}" th:text="${t.name}"></option>
            </select>
        </div>

        <button onclick="loadData()">开始对比</button>
    </div>

    <div class="chart-grid" style="grid-template-columns: 1fr;">
        <div id="radarChart" class="chart-full" style="height: 500px;"></div>
    </div>

    <!-- 新增：Top 3 差异指标 -->
    <div style="margin-top: 30px;">
        <h3>🏆 最显著的三个差异指标 (Top 3 Distinctive Indicators)</h3>
        <div id="top3Container" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
            <!-- Charts will be inserted here -->
        </div>
    </div>

    <!-- 新增：详细数据对比卡片 -->
    <div class="stats-container" style="display: flex; gap: 20px; margin-top: 20px;">
        <!-- Solvable Card -->
        <div class="stat-card" style="flex: 1; background: #e8f5e9; padding: 20px; border-radius: 8px; border: 1px solid #c8e6c9;">
            <h3 style="color: #2e7d32; border-bottom: 1px solid #a5d6a7; padding-bottom: 10px;">✅ 可解决问题 (Solvable)</h3>
            <div id="solvableStats">Loading...</div>
        </div>

        <!-- Hard Card -->
        <div class="stat-card" style="flex: 1; background: #ffebee; padding: 20px; border-radius: 8px; border: 1px solid #ffcdd2;">
            <h3 style="color: #c62828; border-bottom: 1px solid #ef9a9a; padding-bottom: 10px;">❌ 难解决问题 (Hard)</h3>
            <div id="hardStats">Loading...</div>
        </div>
    </div>

</div>

<script>
    let radarChart = echarts.init(document.getElementById('radarChart'));

    function loadData() {
        radarChart.showLoading();

        const formData = new FormData();
        formData.append('startDate', document.getElementById('startDate').value);
        formData.append('endDate', document.getElementById('endDate').value);
        const topicId = document.getElementById('topicId').value;
        if (topicId) formData.append('topicId', topicId);

        fetch('/solvable/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                radarChart.hideLoading();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    renderCharts(data);
                }
            })
            .catch(err => {
                console.error(err);
                radarChart.hideLoading();
                alert("请求失败");
            });
    }

    function renderCharts(data) {
        // 1. 渲染雷达图
        radarChart.setOption({
            title: { text: '多维度特征对比 (归一化)', left: 'center' },
            tooltip: {},
            legend: { data: ['Solvable', 'Hard'], bottom: 0 },
            radar: {
                indicator: data.radarIndicator,
                radius: '65%'
            },
            series: [{
                name: 'Solvable vs Hard',
                type: 'radar',
                data: [
                    { value: data.radarSolvable, name: 'Solvable', itemStyle: { color: '#4caf50' }, areaStyle: { opacity: 0.3 } },
                    { value: data.radarHard, name: 'Hard', itemStyle: { color: '#f44336' }, areaStyle: { opacity: 0.3 } }
                ]
            }]
        });

        // 2. 渲染 Top 3 差异图
        renderTop3Charts(data.top3Differences);

        // 3. 渲染详细数据卡片
        renderStatsCard('solvableStats', data.stats.solvable);
        renderStatsCard('hardStats', data.stats.hard);
    }

    function renderTop3Charts(top3Data) {
        const container = document.getElementById('top3Container');
        container.innerHTML = ''; // Clear previous

        if (!top3Data || top3Data.length === 0) {
            container.innerHTML = '<div>暂无数据</div>';
            return;
        }

        top3Data.forEach((item, index) => {
            const div = document.createElement('div');
            div.style.height = '300px';
            div.style.border = '1px solid #eee';
            div.style.borderRadius = '4px';
            div.style.padding = '10px';
            div.style.background = 'white';
            div.id = 'top3_chart_' + index;
            container.appendChild(div);

            const chart = echarts.init(div);
            chart.setOption({
                title: { text: item.name, left: 'center', textStyle: { fontSize: 14 } },
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: ['Solvable', 'Hard'] },
                yAxis: { type: 'value' },
                series: [{
                    data: [
                        { value: item.solvable, itemStyle: { color: '#4caf50' } },
                        { value: item.hard, itemStyle: { color: '#f44336' } }
                    ],
                    type: 'bar',
                    barWidth: '50%',
                    label: { show: true, position: 'top' }
                }]
            });
        });
    }

    function renderStatsCard(elementId, stats) {
        const html = `
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div><strong>数量:</strong> ${stats.count}</div>
                <div><strong>平均声望:</strong> ${stats.avgReputation}</div>
                <div><strong>平均浏览:</strong> ${stats.avgViews}</div>
                <div><strong>平均答案:</strong> ${stats.avgAnswers}</div>
                <div><strong>平均评论:</strong> ${stats.avgComments}</div>
                <div><strong>平均点赞:</strong> ${stats.avgScore}</div>
                <div><strong>最高赞答案均值:</strong> ${stats.avgMaxAnswerScore}</div>
                <div><strong>平均标签数:</strong> ${stats.avgTagsCount}</div>
                <div><strong>Body长度:</strong> ${stats.avgBodyLen}</div>
                <div><strong>Title长度:</strong> ${stats.avgTitleLen}</div>
            </div>
        `;
        document.getElementById(elementId).innerHTML = html;
    }

    window.addEventListener('resize', () => {
        radarChart.resize();
    });

    loadData();
</script>
</body>
</html>
