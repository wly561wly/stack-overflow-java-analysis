<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>可解决 vs 难解决问题对比</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f4f6f9; }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .controls { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 6px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        .control-group label { font-weight: bold; font-size: 0.9em; color: #555; }
        button { background: #007bff; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .chart-box { height: 400px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        .chart-full { width: 100%; height: 400px; margin-top: 20px; border: 1px solid #eee; border-radius: 4px; padding: 10px; }
        a.nav-link { text-decoration: none; color: #007bff; font-weight: bold; margin-left: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>可解决 vs 难解决问题对比 (Solvable vs Hard)</h2>
        <div style="font-size: 0.9em;">
            <a href="/" class="nav-link">🏠 首页</a> |
            <a href="/trend" class="nav-link">📈 趋势分析</a> |
            <a href="/cooccurrence" class="nav-link">🔗 共现分析</a> |
            <a href="/pitfall" class="nav-link">⚠️ 陷阱分析</a> |
            <span style="color: #666; margin-left: 10px; font-weight: bold;">⚖️ 难易对比</span>
        </div>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>时间范围</label>
            <div style="display: flex; gap: 5px;">
                <input type="date" id="startDate" value="2020-01-01">
                <input type="date" id="endDate" value="2024-12-31">
            </div>
        </div>

        <div class="control-group">
            <label>主题筛选 (可选)</label>
            <select id="topicId">
                <option value="">-- 所有主题 --</option>
                <option th:each="t : ${topics}" th:value="${t.id}" th:text="${t.name}"></option>
            </select>
        </div>

        <button onclick="loadData()">开始对比</button>
    </div>

    <div class="chart-grid">
        <div id="pieChart" class="chart-box"></div>
        <div id="radarChart" class="chart-box"></div>
    </div>
    <div class="chart-grid">
        <div id="barChart" class="chart-box"></div>
        <div id="lineChart" class="chart-box"></div>
    </div>
</div>

<script>
    let pieChart = echarts.init(document.getElementById('pieChart'));
    let radarChart = echarts.init(document.getElementById('radarChart'));
    let barChart = echarts.init(document.getElementById('barChart'));
    let lineChart = echarts.init(document.getElementById('lineChart'));

    function loadData() {
        pieChart.showLoading();
        radarChart.showLoading();
        barChart.showLoading();
        lineChart.showLoading();

        const formData = new FormData();
        formData.append('startDate', document.getElementById('startDate').value);
        formData.append('endDate', document.getElementById('endDate').value);
        const topicId = document.getElementById('topicId').value;
        if (topicId) formData.append('topicId', topicId);

        fetch('/solvable/data', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                pieChart.hideLoading();
                radarChart.hideLoading();
                barChart.hideLoading();
                lineChart.hideLoading();
                
                if (data.error) {
                    alert(data.error);
                } else {
                    renderCharts(data);
                }
            })
            .catch(err => {
                console.error(err);
                pieChart.hideLoading();
                radarChart.hideLoading();
                barChart.hideLoading();
                lineChart.hideLoading();
                alert("请求失败");
            });
    }

    function renderCharts(data) {
        // 1. 饼图
        pieChart.setOption({
            title: { text: '问题数量占比', left: 'center' },
            tooltip: { trigger: 'item' },
            legend: { bottom: '0%' },
            series: [{
                type: 'pie',
                radius: '50%',
                data: data.pieData,
                color: ['#91cc75', '#ee6666']
            }]
        });

        // 2. 雷达图
        radarChart.setOption({
            title: { text: '综合维度对比', left: 'center' },
            tooltip: {},
            legend: { bottom: '0%' },
            radar: { indicator: data.radarIndicator },
            series: [{
                type: 'radar',
                data: [
                    { value: data.radarSolvable, name: 'Solvable', itemStyle: { color: '#91cc75' } },
                    { value: data.radarHard, name: 'Hard-to-Solve', itemStyle: { color: '#ee6666' } }
                ]
            }]
        });

        // 3. 柱状图
        barChart.setOption({
            title: { text: '核心指标对比', left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: { bottom: '0%' },
            xAxis: { type: 'category', data: data.barX },
            yAxis: { type: 'value' },
            series: [
                { name: 'Solvable', type: 'bar', data: data.barSolvable, itemStyle: { color: '#91cc75' } },
                { name: 'Hard-to-Solve', type: 'bar', data: data.barHard, itemStyle: { color: '#ee6666' } }
            ]
        });

        // 4. 折线图
        lineChart.setOption({
            title: { text: '数量趋势对比', left: 'center' },
            tooltip: { trigger: 'axis' },
            legend: { bottom: '0%' },
            xAxis: { type: 'category', data: data.dates },
            yAxis: { type: 'value' },
            series: [
                { name: 'Solvable', type: 'line', data: data.lineSolvable, itemStyle: { color: '#91cc75' }, smooth: true },
                { name: 'Hard-to-Solve', type: 'line', data: data.lineHard, itemStyle: { color: '#ee6666' }, smooth: true }
            ]
        });
    }

    window.addEventListener('resize', () => {
        pieChart.resize();
        radarChart.resize();
        barChart.resize();
        lineChart.resize();
    });

    loadData();
</script>
</body>
</html>
